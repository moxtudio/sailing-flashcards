<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sailing Flash Cards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a1628; color: #e8edf3; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; color: #fff; }
    .subtitle { font-size: 14px; color: #7a8ba3; margin-bottom: 20px; }
    .mode-toggle { display: flex; background: #12243e; border-radius: 28px; padding: 4px; margin-bottom: 24px; border: 1px solid #2a3a52; }
    .mode-btn { padding: 10px 28px; border-radius: 24px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: transparent; color: #5a7a9a; transition: all 0.25s; }
    .mode-btn.active { background: #4a9eff; color: #fff; }
    .category-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; max-width: 800px; }
    .cat-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #2a3a52; background: transparent; color: #7a8ba3; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .cat-btn.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }
    .progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; font-size: 14px; color: #7a8ba3; }
    .progress-bar { width: 200px; height: 6px; background: #1a2a42; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #4a9eff, #6fbbff); border-radius: 3px; transition: width 0.4s ease; }
    .card-container { perspective: 1000px; width: 100%; max-width: 620px; min-height: 340px; margin-bottom: 24px; cursor: pointer; }
    .card { width: 100%; min-height: 340px; position: relative; transform-style: preserve-3d; transition: transform 0.5s ease; }
    .card.flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; width: 100%; min-height: 340px; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 36px; text-align: center; }
    .card-front { background: linear-gradient(145deg, #12243e, #1a3158); border: 1px solid #2a4a6e; }
    .card-back { background: linear-gradient(145deg, #0d3a2e, #164a3a); border: 1px solid #2a6e5a; transform: rotateY(180deg); }
    .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #4a9eff; margin-bottom: 16px; }
    .card-back .card-label { color: #4ae0b0; }
    .card-text { font-size: 22px; font-weight: 600; line-height: 1.4; }
    .card-back .card-text { color: #c8f0e0; }
    .card-hint { position: absolute; bottom: 16px; font-size: 12px; color: #4a6a8a; }
    .card-category { position: absolute; top: 16px; right: 20px; font-size: 11px; color: #3a5a7a; background: #0a1628; padding: 4px 10px; border-radius: 10px; }
    .nav-row { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
    .nav-btn { width: 48px; height: 48px; border-radius: 50%; border: 1px solid #2a3a52; background: #12243e; color: #7a8ba3; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .shuffle-btn { padding: 10px 24px; border-radius: 24px; border: 1px solid #2a3a52; background: #12243e; color: #7a8ba3; font-size: 14px; cursor: pointer; }
    .mark-row { display: flex; gap: 12px; }
    .mark-btn { padding: 10px 20px; border-radius: 12px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .mark-btn.know { background: #1a3a2e; color: #4ae0b0; }
    .mark-btn.study { background: #3a2020; color: #ff7a7a; }
    .score-row { display: flex; gap: 24px; margin-top: 16px; font-size: 13px; color: #5a7a9a; }
    .score-row span { display: flex; align-items: center; gap: 6px; }
    .dot-green { width: 8px; height: 8px; border-radius: 50%; background: #4ae0b0; }
    .dot-red { width: 8px; height: 8px; border-radius: 50%; background: #ff7a7a; }
    .quiz-card { width: 100%; max-width: 620px; background: linear-gradient(145deg, #12243e, #1a3158); border: 1px solid #2a4a6e; border-radius: 16px; padding: 36px; margin-bottom: 24px; text-align: center; }
    .quiz-question { font-size: 22px; font-weight: 600; line-height: 1.4; margin-bottom: 24px; }
    .quiz-textarea { width: 100%; min-height: 80px; padding: 14px 16px; border-radius: 12px; border: 1px solid #2a4a6e; background: #0a1628; color: #e8edf3; font-size: 16px; font-family: inherit; resize: vertical; outline: none; margin-bottom: 20px; display: block; }
    .submit-btn { padding: 12px 32px; border-radius: 24px; border: none; background: #4a9eff; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
    .submit-btn:disabled { background: #2a4a6e; cursor: default; }
    .result-box { width: 100%; max-width: 620px; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; text-align: left; display: none; }
    .result-box.correct { background: #0d3a2e; border: 1px solid #2a6e5a; }
    .result-box.partial { background: #2a2a10; border: 1px solid #6e6a2a; }
    .result-box.incorrect { background: #3a1a1a; border: 1px solid #6e2a2a; }
    .result-header { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .result-box.correct .result-header { color: #4ae0b0; }
    .result-box.partial .result-header { color: #e0d04a; }
    .result-box.incorrect .result-header { color: #ff7a7a; }
    .result-label { font-size: 12px; color: #7a8ba3; margin-top: 10px; margin-bottom: 4px; }
    .result-answer { font-size: 15px; color: #c8f0e0; line-height: 1.5; }
    .result-yours { font-size: 15px; color: #a0b0c0; line-height: 1.5; font-style: italic; }
    .quiz-score-panel { width: 100%; max-width: 620px; background: #12243e; border-radius: 16px; border: 1px solid #2a3a52; padding: 28px 32px; margin-bottom: 24px; text-align: center; display: none; }
    .quiz-pct { font-size: 48px; font-weight: 700; margin-bottom: 4px; }
    .quiz-score-grid { display: flex; justify-content: center; gap: 32px; margin-bottom: 16px; }
    .quiz-score-num { font-size: 36px; font-weight: 700; }
    .quiz-score-num.green { color: #4ae0b0; }
    .quiz-score-num.yellow { color: #e0d04a; }
    .quiz-score-num.red { color: #ff7a7a; }
    .retry-btn { padding: 12px 32px; border-radius: 24px; border: 1px solid #4a9eff; background: transparent; color: #4a9eff; font-size: 15px; font-weight: 600; cursor: pointer; margin: 0 6px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1>⛵ Sailing Flash Cards</h1>
  <p class="subtitle">Executive Leadership 1 | Week 5 · 57 cards</p>
  <div class="mode-toggle">
    <button class="mode-btn active" id="studyModeBtn" onclick="setMode('study')">Study Mode</button>
    <button class="mode-btn" id="quizModeBtn" onclick="setMode('quiz')">Quiz Mode</button>
  </div>
  <div class="category-bar" id="catBar"></div>
  <div class="progress-row">
    <span id="counter">1 / 57</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div id="studyArea">
    <div class="card-container" id="cardContainer" onclick="flipCard()">
      <div class="card" id="card">
        <div class="card-face card-front">
          <div class="card-category" id="cardCat"></div>
          <div class="card-label">Term / Question</div>
          <div class="card-text" id="frontText"></div>
          <div class="card-hint">tap to flip</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">Answer</div>
          <div class="card-text" id="backText"></div>
          <div class="card-hint">tap to flip back</div>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()">←</button>
      <button class="shuffle-btn" onclick="shuffleDeck()">Shuffle</button>
      <button class="nav-btn" onclick="nextCard()">→</button>
    </div>
    <div class="mark-row">
      <button class="mark-btn know" onclick="markCard('know')">Got it</button>
      <button class="mark-btn study" onclick="markCard('study')">Study more</button>
    </div>
    <div class="score-row">
      <span><div class="dot-green"></div><span id="knowCount">0</span> known</span>
      <span><div class="dot-red"></div><span id="studyCount">0</span> to review</span>
    </div>
  </div>
  <div id="quizArea" class="hidden">
    <div class="quiz-card">
      <div class="card-category" id="quizCat" style="position:static;display:inline-block;margin-bottom:16px;"></div>
      <div class="card-label">Question</div>
      <div class="quiz-question" id="quizQuestion"></div>
      <textarea class="quiz-textarea" id="quizInput" placeholder="Type your answer..."></textarea>
      <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">Check Answer</button>
    </div>
    <div class="result-box" id="resultBox">
      <div class="result-header" id="resultHeader"></div>
      <div class="result-label">Your answer:</div>
      <div class="result-yours" id="resultYours"></div>
      <div class="result-label">Correct answer:</div>
      <div class="result-answer" id="resultAnswer"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevQuiz()">←</button>
      <button class="shuffle-btn" onclick="shuffleDeck()">Shuffle</button>
      <button class="nav-btn" onclick="nextQuiz()">→</button>
    </div>
    <div class="score-row">
      <span><div class="dot-green"></div><span id="qCorrect">0</span> correct</span>
      <span><div class="dot-red"></div><span id="qWrong">0</span> missed</span>
      <span><span id="qAnswered">0</span> / <span id="qTotal">57</span> answered</span>
    </div>
    <div class="quiz-score-panel" id="quizScorePanel">
      <div style="font-size:20px;font-weight:700;margin-bottom:16px;">Quiz Complete!</div>
      <div class="quiz-pct" id="quizPct">0%</div>
      <div style="font-size:14px;color:#7a8ba3;margin-bottom:20px;">overall score</div>
      <div class="quiz-score-grid">
        <div style="display:flex;flex-direction:column;align-items:center;"><div class="quiz-score-num green" id="finalCorrect">0</div><div style="font-size:12px;color:#5a7a9a;margin-top:4px;">Correct</div></div>
        <div style="display:flex;flex-direction:column;align-items:center;"><div class="quiz-score-num red" id="finalWrong">0</div><div style="font-size:12px;color:#5a7a9a;margin-top:4px;">Missed</div></div>
      </div>
      <button class="retry-btn" onclick="retryAll()">Retry All</button>
      <button class="retry-btn" onclick="retryMissed()">Retry Missed</button>
    </div>
  </div>
  <script>
    const allCards = [
      {cat:"Orientation",q:"Starboard side",a:"Right hand side of the boat when facing forward",keywords:["right","forward"]},
      {cat:"Orientation",q:"Port side",a:"Left hand side of the boat when facing forward. Left and Port both have four letters.",keywords:["left","forward","four"]},
      {cat:"Orientation",q:"Bow",a:"Front or forward end of the boat",keywords:["front","forward"]},
      {cat:"Orientation",q:"Stern",a:"Back or aft end of the boat",keywords:["back","aft"]},
      {cat:"Orientation",q:"Astern",a:"An object located behind the boat",keywords:["behind","object"]},
      {cat:"Orientation",q:"Ahead",a:"An object located in front of the boat",keywords:["front","object"]},
      {cat:"Orientation",q:"Windward side",a:"The side of the boat that the wind blows upon first",keywords:["wind","first","blows"]},
      {cat:"Orientation",q:"Leeward side",a:"The downwind side, or the side furthest away from the wind",keywords:["downwind","furthest","away"]},
      {cat:"Orientation",q:"Which changes when wind shifts: Port/Starboard or Windward/Leeward?",a:"Windward/Leeward changes. Port and Starboard are fixed.",keywords:["windward","leeward","fixed"]},
      {cat:"Orientation",q:"Starboard Tack",a:"When sailing and the wind is blowing onto the starboard right side. Your boom is to port.",keywords:["wind","starboard","right","boom","port"]},
      {cat:"Boat Parts",q:"Cockpit",a:"Area around and in front of the wheel where the crew spends most of their time adjusting sails, steering, and hanging out",keywords:["wheel","crew","adjusting","steering"]},
      {cat:"Boat Parts",q:"Hull",a:"The floating body of the boat",keywords:["floating","body"]},
      {cat:"Boat Parts",q:"Deck",a:"The component that encloses the top of the hull",keywords:["top","hull","encloses"]},
      {cat:"Boat Parts",q:"Lifelines",a:"Wire cables that run around the outside of the deck to help keep crew aboard",keywords:["wire","cables","outside","deck","aboard"]},
      {cat:"Boat Parts",q:"Boom",a:"The horizontal pole that holds the bottom of the mainsail. Mind the Boom! It swings across when turning.",keywords:["horizontal","pole","mainsail","bottom","swings"]},
      {cat:"Boat Parts",q:"Mast",a:"Vertical pole that holds up the sails",keywords:["vertical","pole","sails","holds"]},
      {cat:"Boat Parts",q:"Shrouds",a:"Wire cables that hold up the mast",keywords:["wire","cables","mast"]},
      {cat:"How It Works",q:"What is the sailor's boat fuel?",a:"The wind",keywords:["wind"]},
      {cat:"How It Works",q:"What aspects of wind must a sailor know?",a:"Direction and speed",keywords:["direction","speed"]},
      {cat:"How It Works",q:"Clues to determine wind direction and speed?",a:"Ripples on the water, smoke, flags, other sailboats, windex, instruments",keywords:["ripples","smoke","flags","sailboats","windex","instruments"]},
      {cat:"How It Works",q:"What part of an airplane works like a sailboat?",a:"The wing. Both have a foil shape.",keywords:["wing","foil"]},
      {cat:"How It Works",q:"What force do sailboats share with airplanes?",a:"Lift",keywords:["lift"]},
      {cat:"How It Works",q:"What are the 2 major forces that move a sailboat forward?",a:"Lifting force of the wind on the sails and resisting force of the water against the keel.",keywords:["lift","wind","sails","resist","water","keel"]},
      {cat:"Points of Sail",q:"No-Sail Zone (NSZ)",a:"90 degrees total: 45 degrees on either side of where the wind is blowing from. Sailboats cannot sail into this zone.",keywords:["90","45","degrees","wind"]},
      {cat:"Points of Sail",q:"In Irons",a:"Heading upwind with the wind coming from the no-sail zone. Sails are luffing. The boat is stuck.",keywords:["upwind","no-sail","luffing","stuck"]},
      {cat:"Points of Sail",q:"Close-Hauled",a:"Sailing upwind on the edge of the NSZ. Sails hauled in as close as possible to the center line.",keywords:["upwind","edge","nsz","hauled","close","center"]},
      {cat:"Points of Sail",q:"Close Reach",a:"Boat headed upwind at about 10 or 2 o'clock",keywords:["10","2","upwind"]},
      {cat:"Points of Sail",q:"Beam Reach",a:"Boat at about 3 or 9 o'clock. Wind coming directly over the beam, widest part of the boat.",keywords:["3","9","beam","widest"]},
      {cat:"Points of Sail",q:"Broad Reach",a:"Boat headed downwind at about 3:30 or 7:30 o'clock",keywords:["downwind"]},
      {cat:"Points of Sail",q:"Run",a:"Boat headed directly downwind, between 5 and 7 o'clock",keywords:["downwind","5","7","directly"]},
      {cat:"Points of Sail",q:"What is the clock-like diagram showing wind direction relative to a sailboat?",a:"Points of Sail",keywords:["points","sail"]},
      {cat:"Rigging",q:"Mainsheet",a:"Line used to control the angle of the mainsail to the wind",keywords:["line","angle","mainsail","wind","control"]},
      {cat:"Rigging",q:"Halyard",a:"Line used to raise the mainsail",keywords:["line","raise","mainsail"]},
      {cat:"Rigging",q:"Mainsail",a:"The largest sail",keywords:["largest","sail"]},
      {cat:"Rigging",q:"Jib",a:"The smaller sail located forward of the mainsail",keywords:["smaller","sail","forward","mainsail"]},
      {cat:"Rigging",q:"Line",a:"A rope with a useful purpose on a sailboat",keywords:["rope","purpose","job"]},
      {cat:"Rigging",q:"Furling Line",a:"The line used to wind up the jib and reduce its size",keywords:["jib","reduce","size"]},
      {cat:"Rigging",q:"Reef the Main",a:"Reducing the size of the mainsail by lowering it",keywords:["reducing","size","mainsail","lowering"]},
      {cat:"Commands",q:"What is the helmsperson's main job?",a:"Drive the boat and give directional commands",keywords:["drive","directional","commands"]},
      {cat:"Commands",q:"What is the sail trimmer's main job?",a:"Trim sails correctly and talk about sail trim",keywords:["trim","sails","correctly","talk"]},
      {cat:"Commands",q:"What are the only 2 ways to position the sails?",a:"Ease out or Trim in",keywords:["ease","trim"]},
      {cat:"Commands",q:"Trim the main means...",a:"Pull in or tighten the mainsheet",keywords:["pull","tighten","mainsheet"]},
      {cat:"Commands",q:"Ease the main means...",a:"Let out or loosen the mainsheet",keywords:["let out","loosen","mainsheet"]},
      {cat:"Commands",q:"Head up = what sail action?",a:"Trim the main and jib sheet",keywords:["trim","pull","main","jib"]},
      {cat:"Commands",q:"Head down = what sail action?",a:"Ease the main and jib sheet",keywords:["ease","let out","main","jib"]},
      {cat:"Commands",q:"What gives mechanical advantage when trimming?",a:"The winch",keywords:["winch"]},
      {cat:"Commands",q:"Tacking",a:"Maneuver to get upwind. The bow crosses the wind. Commands: Ready to tack? / Ready! / Tacking!",keywords:["upwind","bow","crosses","ready"]},
      {cat:"Commands",q:"Gybing (Jibing)",a:"Turning downwind. The stern crosses the wind. Commands: Ready to jibe? / Ready! / Gybing!",keywords:["downwind","stern","crosses","ready"]},
      {cat:"Commands",q:"What are the 2 fundamental maneuvers for crossing the wind?",a:"Tack and Gybe",keywords:["tack","gybe","jibe"]},
      {cat:"Miscellaneous",q:"Fenders",a:"Inflatable devices used to protect the sides of a boat",keywords:["inflatable","protect","sides"]},
      {cat:"Miscellaneous",q:"Pelican Hooks",a:"Hooks that fasten the lifeline to the stanchion",keywords:["fasten","lifeline","stanchion"]},
      {cat:"Miscellaneous",q:"S.L.O.W.",a:"An acronym for remembering the rules of the road",keywords:["acronym","rules","road"]},
      {cat:"Miscellaneous",q:"Rules of the Road",a:"How one determines which boat has right of way when two or more boats are on a collision course",keywords:["right of way","collision","boats"]},
      {cat:"Miscellaneous",q:"Buoys",a:"Navigation markers. They are either red or green.",keywords:["red","green","navigation","markers"]},
      {cat:"Miscellaneous",q:"When in doubt?",a:"Let it out.",keywords:["let it out"]},
      {cat:"Miscellaneous",q:"Landlubber",a:"Someone new to sailing",keywords:["new","sailing"]},
      {cat:"Miscellaneous",q:"Best way to dress for sailing?",a:"Layered clothes",keywords:["layered","layers","clothes"]},
      {cat:"Miscellaneous",q:"3 considerations for a sailing trip?",a:"Weather, water and air temperatures, season, type of boat",keywords:["weather","temperature","season","boat"]},
      {cat:"Miscellaneous",q:"2 key things when boarding at the dock?",a:"Make sure the boat is close so you do not stretch or jump. Transfer weight slowly and directly downward, then bring other foot aboard.",keywords:["close","weight","slowly","downward","foot"]},
    ];
    let deck=[...allCards],currentIndex=0,mode='study',known=new Set(),studyMore=new Set(),activeCategory='All',quizResults={};
    const categories=['All',...new Set(allCards.map(c=>c.cat))];
    function renderCatBar(){const bar=document.getElementById('catBar');bar.innerHTML='';categories.forEach(cat=>{const btn=document.createElement('button');btn.className='cat-btn'+(cat===activeCategory?' active':'');btn.textContent=cat;btn.onclick=()=>{activeCategory=cat;filterDeck();};bar.appendChild(btn);});}
    function filterDeck(){deck=activeCategory==='All'?[...allCards]:allCards.filter(c=>c.cat===activeCategory);currentIndex=0;quizResults={};renderCatBar();updateView();}
    function updateCounter(){document.getElementById('counter').textContent=`${currentIndex+1} / ${deck.length}`;document.getElementById('progressFill').style.width=`${((currentIndex+1)/deck.length)*100}%`;}
    function shuffleDeck(){for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}currentIndex=0;quizResults={};updateView();}
    function setMode(m){mode=m;document.getElementById('studyModeBtn').classList.toggle('active',m==='study');document.getElementById('quizModeBtn').classList.toggle('active',m==='quiz');document.getElementById('studyArea').classList.toggle('hidden',m!=='study');document.getElementById('quizArea').classList.toggle('hidden',m!=='quiz');quizResults={};currentIndex=0;updateView();}
    function updateView(){if(mode==='study')showStudyCard();else showQuizCard();}
    function showStudyCard(){if(!deck.length)return;const c=deck[currentIndex];document.getElementById('frontText').textContent=c.q;document.getElementById('backText').textContent=c.a;document.getElementById('cardCat').textContent=c.cat;document.getElementById('card').classList.remove('flipped');updateCounter();}
    function flipCard(){document.getElementById('card').classList.toggle('flipped');}
    function nextCard(){currentIndex=(currentIndex+1)%deck.length;showStudyCard();}
    function prevCard(){currentIndex=(currentIndex-1+deck.length)%deck.length;showStudyCard();}
    function markCard(type){const key=deck[currentIndex].q;if(type==='know'){known.add(key);studyMore.delete(key);}else{studyMore.add(key);known.delete(key);}document.getElementById('knowCount').textContent=known.size;document.getElementById('studyCount').textContent=studyMore.size;nextCard();}
    function showQuizCard(){if(!deck.length)return;const c=deck[currentIndex];document.getElementById('quizQuestion').textContent=c.q;document.getElementById('quizCat').textContent=c.cat;document.getElementById('quizScorePanel').style.display='none';updateCounter();const prev=quizResults[currentIndex];if(prev){document.getElementById('quizInput').value=prev.yourAnswer;document.getElementById('quizInput').disabled=true;document.getElementById('submitBtn').disabled=true;showResult(prev.grade,prev.yourAnswer,c.a);}else{document.getElementById('quizInput').value='';document.getElementById('quizInput').disabled=false;document.getElementById('submitBtn').disabled=false;document.getElementById('resultBox').style.display='none';}}
    function gradeAnswer(ua,card){ua=ua.toLowerCase().trim();if(!ua)return'incorrect';const ca=card.a.toLowerCase();const kw=card.keywords||[];if(ua===ca||ca.includes(ua)||ua.includes(ca))return'correct';let matched=0;for(const k of kw){if(ua.includes(k.toLowerCase()))matched++;}const ratio=kw.length>0?matched/kw.length:0;if(ratio>=0.6)return'correct';if(ratio>=0.3)return'partial';const caWords=ca.split(/\W+/).filter(w=>w.length>3);let wm=0;for(const w of caWords){if(ua.includes(w))wm++;}const wr=caWords.length>0?wm/caWords.length:0;if(wr>=0.5)return'correct';if(wr>=0.25)return'partial';return'incorrect';}
    function submitAnswer(){const input=document.getElementById('quizInput');const ua=input.value.trim();if(!ua)return;const c=deck[currentIndex];const grade=gradeAnswer(ua,c);quizResults[currentIndex]={grade,yourAnswer:ua};input.disabled=true;document.getElementById('submitBtn').disabled=true;showResult(grade,ua,c.a);updateQuizScores();if(Object.keys(quizResults).length===deck.length)setTimeout(showFinalScore,800);}
    function showResult(grade,yours,correct){const box=document.getElementById('resultBox');box.style.display='block';box.className='result-box '+grade;document.getElementById('resul
